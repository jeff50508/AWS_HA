apiVersion: apps/v1
kind: Deployment
metadata:
  name: titan-app
  labels:
    app: titan-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: titan-app
  template:
    metadata:
      labels:
        app: titan-app
      annotations:
        # Senior Practice: Prometheus Scrape Config
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
      - name: app
        image: project-titan-app:latest
        ports:
        - containerPort: 8000
        - containerPort: 8001
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        healthCheck:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: titan-app-svc
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    name: http
  - port: 8001
    targetPort: 8001
    name: metrics
  selector:
    app: titan-app
