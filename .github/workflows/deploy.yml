name: Titan-Ops CI/CD Platform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Infrastructure Quality & Security Scan
  iac-scan:
    name: "Infrastructure Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true # Set to false to block builds on security violations

  # 2. Application Unit & Integration Testing
  app-test:
    name: "Application Testing (Pytest)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd app
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/

  # 3. Container Security & Supply Chain
  security-scan:
    name: "Container Security (Trivy)"
    needs: [iac-scan, app-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          cd app
          docker build -t project-titan-app:${{ github.sha }} .

      - name: Run Trivy scanner (Blocking CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'project-titan-app:${{ github.sha }}'
          format: 'table'
          # Senior decision: Exit 1 on CRITICAL vulnerabilities to prevent insecure deployments
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  # 4. Professional Deployment Logic (Multi-Environment)
  deploy:
    name: "Production Deployment"
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Apply (Production)
        run: |
          cd terraform
          terraform init
          terraform apply -var-file="prod.tfvars" -auto-approve
        # Senior Practice: Always use -var-file for env-specific configs

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: titan-ops-app
          IMAGE_TAG: latest # In production, use ${{ github.sha }} and update appspec dynamic
        run: |
          cd app
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy application via AWS CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name titan-ops-app \
            --deployment-group-name titan-ops-dg \
            --github-location repository=${{ github.repository }},commitId=${{ github.sha }} \
            --ignore-application-stop-failures
